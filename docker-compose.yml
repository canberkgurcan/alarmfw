# AlarmFW — Docker Compose (Linux host)
#
# Gerekli: proje dizininde bir .env dosyası oluştur (bkz. .env.example)
#   SECRETS_DIR=/path/to/alarmfw-secrets
#   SMTP_HOST=...  SMTP_PORT=25  vb.
#
# Başlatmak için:
#   docker compose up -d

services:

  alarmfw:
    build: .
    image: alarmfw:latest
    restart: unless-stopped
    environment:
      - ZABBIX_URL=${ZABBIX_URL:-}
      - ZABBIX_TOKEN=${ZABBIX_TOKEN:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-25}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_TO=${SMTP_TO:-}
    volumes:
      - ./config:/config:ro
      - ${SECRETS_DIR:-./secrets}:/secrets:ro
      - alarmfw-state:/state
    command: ["run", "--config", "/config/run_server.yaml"]

  alarmfw-api:
    build: ../alarmfw-api
    image: alarmfw-api:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ALARMFW_CONFIG=/config
      - ALARMFW_SECRETS=/secrets
      - ALARMFW_ENV=/config/.env
      - ALARMFW_STATE=/state
      - ALARMFW_API_KEY=${ALARMFW_API_KEY}
      - ALARMFW_API_KEY_ADMIN=${ALARMFW_API_KEY_ADMIN:-}
      - ALARMFW_API_KEY_OPERATOR=${ALARMFW_API_KEY_OPERATOR:-}
      - ALARMFW_API_KEY_READONLY=${ALARMFW_API_KEY_READONLY:-}
    volumes:
      - ./config:/config
      - ${SECRETS_DIR:-./secrets}:/secrets
      - alarmfw-state:/state
      - /var/run/docker.sock:/var/run/docker.sock

  alarmfw-observe:
    build: ../alarmfw-observe
    image: alarmfw-observe:latest
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - ALARMFW_CONFIG=/config
      - ALARMFW_SECRETS=/secrets
    volumes:
      - ./config:/config:ro
      - ${SECRETS_DIR:-./secrets}:/secrets:ro

  alarmfw-ui:
    build:
      context: ../alarmfw-ui
    image: alarmfw-ui:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://alarmfw-api:8000
      - OBSERVE_URL=http://alarmfw-observe:8001
      # Auth.js — public URL for redirect (logout vb.)
      - AUTH_URL=${AUTH_URL:-http://localhost:3000}
      # Auth.js session secret (openssl rand -base64 32)
      - AUTH_SECRET=${AUTH_SECRET}
      # UI kullanıcı şifreleri
      - UI_ADMIN_PASSWORD=${UI_ADMIN_PASSWORD}
      - UI_OPERATOR_PASSWORD=${UI_OPERATOR_PASSWORD:-}
      - UI_READONLY_PASSWORD=${UI_READONLY_PASSWORD:-}
      # UI → API key eşlemesi
      - ALARMFW_API_KEY=${ALARMFW_API_KEY}
      - ALARMFW_API_KEY_ADMIN=${ALARMFW_API_KEY_ADMIN:-}
      - ALARMFW_API_KEY_OPERATOR=${ALARMFW_API_KEY_OPERATOR:-}
      - ALARMFW_API_KEY_READONLY=${ALARMFW_API_KEY_READONLY:-}
    depends_on:
      - alarmfw-api
      - alarmfw-observe

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  alarmfw-state:
